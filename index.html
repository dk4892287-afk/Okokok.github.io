<!DOCTYPE html>
<html>
<head>
  <title>Topic Tree</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    ul {
      list-style-type: none;
    }

    li {
      margin: 5px 0;
      cursor: pointer;
    }

    li::before {
      content: "📁 ";
    }

    .nested {
      display: none;
      margin-left: 20px;
    }

    .active {
      display: block;
    }
  </style>
</head>
<body>

<h1>📚 Topic Tree</h1>

<ul>
  <li onclick="toggle(this)">
    HTML
    <ul class="nested">
      <li>Basics</li>
      <li>Tags</li>
      <li>Forms</li>
    </ul>
  </li>

  <li onclick="toggle(this)">
    CSS
    <ul class="nested">
      <li>Colors</li>
      <li>Flexbox</li>
      <li>Animations</li>
    </ul>
  </li>

  <li onclick="toggle(this)">
    JavaScript
    <ul class="nested">
      <li>Variables</li>
      <li>Functions</li>
      <li>DOM</li>
    </ul>
  </li>
</ul>

<script>
  function toggle(element) {
    let nested = element.querySelector(".nested");
    nested.classList.toggle("active");
  }
</script>

</body>
</html>
